// ===== api.jsx — talk to the Flask backend =====
const API = {
  async get(path) {
    const r = await fetch(path);
    if (!r.ok) throw new Error('GET ' + path + ' -> ' + r.status);
    return r.json();
  },
  async post(path, body) {
    const r = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body || {}),
    });
    if (!r.ok) throw new Error('POST ' + path + ' -> ' + r.status);
    return r.json();
  },
};
window.API = API;

function useI18n(lang) {
  return React.useCallback((key) => {
    const entry = DICT[key];
    if (!entry) return key;
    return entry[lang] || entry.en || key;
  }, [lang]);
}

function fmtRM(n, opts = {}) {
  const { decimals = 0, plus = false } = opts;
  const num = Math.round(Number(n) * 100) / 100;
  const sign = plus && num > 0 ? '+' : '';
  return sign + 'RM ' + num.toLocaleString('en-MY', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}
window.useI18n = useI18n; window.fmtRM = fmtRM;

function Button({ children, variant = 'primary', size = 'md', className = '', ...rest }) {
  const base = 'inline-flex items-center justify-center gap-2 font-medium transition-all rounded-full whitespace-nowrap disabled:opacity-40 disabled:cursor-not-allowed';
  const sizes = { sm: 'px-3.5 py-1.5 text-sm', md: 'px-5 py-2.5 text-[15px]', lg: 'px-7 py-3.5 text-base' };
  const variants = {
    primary: 'btn-primary shadow-sm hover:shadow-md active:scale-[0.98]',
    secondary: 'bg-white text-ink border border-line hover:bg-paper-2 active:scale-[0.98]',
    ghost: 'bg-transparent text-ink-2 hover:bg-paper-2',
    dark: 'bg-teal-900b text-white hover:opacity-90 active:scale-[0.98]',
  };
  return <button className={`${base} ${sizes[size]} ${variants[variant]} ${className}`} {...rest}>{children}</button>;
}

function Chip({ children, tone = 'teal', className = '', onClick }) {
  const tones = {
    teal: 'chip-citation', neutral: 'bg-paper-2 text-ink-2 border border-line',
    green: 'bg-emerald-50 text-emerald-700 border border-emerald-200',
    amber: 'bg-amber-50 text-amber-800 border border-amber-200',
  };
  return <button onClick={onClick} className={`inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-[11.5px] font-medium tabular tracking-tight transition-colors ${tones[tone]} ${className}`}>{children}</button>;
}

function useCountUp(to, durationMs = 900) {
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    let raf; const start = performance.now(); const ease = (t) => 1 - Math.pow(1 - t, 3);
    const tick = (now) => { const t = Math.min(1, (now - start) / durationMs); setVal(to * ease(t)); if (t < 1) raf = requestAnimationFrame(tick); };
    raf = requestAnimationFrame(tick); return () => cancelAnimationFrame(raf);
  }, [to, durationMs]);
  return val;
}

function Progress({ value, className = '' }) {
  return <div className={`h-1.5 w-full rounded-full bg-paper-2 overflow-hidden ${className}`}><div className="h-full bg-teal-brand transition-all duration-500 ease-out" style={{ width: `${Math.min(100, Math.max(0, value))}%` }} /></div>;

function Segmented({ options, value, onChange, className = '' }) {

}

function PageUpload({ t, lang, mode, onDone }) {
  const [phase, setPhase] = React.useState('idle');

  const [dragOver, setDragOver] = React.useState(false);
  const [fields, setFields] = React.useState(null);

  const subKey = mode === 'sme' ? 'upload_sub_sme' : mode === 'freelancer' ? 'upload_sub_free' : 'upload_sub_ind';

  const startRead = (name) => {
    setFileName(name || (mode === 'sme' ? 'P&L_FY2025.pdf' : 'EA_Form_2025.pdf'));
    setPhase('reading'); setStep(0);
    let s = 0;
    const iv = setInterval(() => {
      s++; setStep(s);
      if (s >= 3) {
        clearInterval(iv);
        // fetch the sample/extracted figures from the backend
        API.get('/api/sample/' + mode).then((data) => {
          setTimeout(() => { setFields({ ...data }); setPhase('confirm'); }, 350);
        }).catch(() => { setFields(mode === 'sme' ? { grossIncome: 0 } : { grossIncome: 0, bonus: 0, epf: 0, pcb: 0 }); setPhase('confirm'); });
      }
    }, 680);
  };
  const onDrop = (e) => { e.preventDefault(); setDragOver(false); const f = e.dataTransfer?.files?.[0]; startRead(f ? f.name : null); };
  const label = (k) => t(k);

  return (
    <main className="max-w-[1000px] mx-auto px-5 md:px-8 pt-14 pb-24 slide-in">
      <div className="max-w-2xl">
        <div className="text-[11.5px] uppercase tracking-[0.15em] text-ink-3 font-mono">Step 03 / 07</div>

        <p className="mt-4 text-[16.5px] text-ink-2 leading-relaxed">{t(subKey)}</p>
      </div>

      {phase === 'idle' && (
        <div className="mt-12 fade-in">
          <div onDragOver={(e) => { e.preventDefault(); setDragOver(true); }} onDragLeave={() => setDragOver(false)} onDrop={onDrop} onClick={() => startRead(null)}
            className={`relative rounded-3xl border-2 border-dashed p-14 md:p-20 text-center cursor-pointer transition-all ${dragOver ? 'border-teal-brand bg-teal-50b' : 'border-line bg-white hover:bg-paper-2'}`}>
            <div className="mx-auto w-16 h-16 rounded-2xl bg-teal-50b text-teal-brand flex items-center justify-center"><Icon name="upload" className="w-7 h-7" /></div>
            <div className="mt-5 font-display text-2xl tracking-tight">{t('upload_cta')}</div>
            <div className="mt-2 text-[13px] text-ink-3 font-mono">{t('upload_cta_sub')}</div>
          </div>
          <div className="mt-4 text-center"><button onClick={() => startRead(null)} className="text-[13.5px] text-teal-brand font-medium hover:underline">{t('upload_sample')} →</button></div>
        </div>
      )}

      {phase === 'reading' && (
        <div className="mt-12 fade-in">
          <div className="rounded-3xl border border-line bg-white p-8 md:p-10">
            <div className="flex items-center gap-4">
              <div className="relative w-12 h-12 rounded-2xl bg-teal-50b text-teal-brand flex items-center justify-center"><Icon name="doc" className="w-6 h-6" /><span className="pulse-ring" /></div>
              <div><div className="text-[15px] font-medium">{t('upload_reading')}</div><div className="text-[12.5px] text-ink-3 font-mono">{fileName}</div></div>
            </div>
            <div className="mt-8 space-y-3">
              {[t('upload_step_1'), t('upload_step_2'), t('upload_step_3')].map((s, i) => {
                const done = step > i, active = step === i;
                return (
                  <div key={i} className="flex items-center gap-3 text-[14px]">

      {phase === 'confirm' && fields && (
        <div className="mt-12 fade-in">
          <div className="rounded-3xl border border-line bg-white overflow-hidden">

                <div key={key} className="bg-white p-5 md:p-6">

            </div>
          </div>
        </div>
      )}
    </main>
  );
}

                <div className={`w-8 h-8 rounded-full flex items-center justify-center transition-all ${current === opt.v ? 'bg-teal-brand text-white' : 'border border-line text-ink-3 group-hover:border-ink-2'}`}><Icon name={opt.v === 'yes' ? 'check' : 'close'} className="w-4 h-4" /></div>
              </div>
            </button>
          ))}
        </div>
        <div className="mt-6 flex items-center justify-between">
          <Button variant="ghost" size="sm" onClick={back} disabled={idx === 0}><Icon name="arrowLeft" className="w-4 h-4" /> {t('wiz_back')}</Button>
          <button onClick={() => answer('skip')} className="text-[13px] text-ink-3 hover:text-ink-2 transition-colors">{t('wiz_skip')} →</button>
        </div>
      </div>
      <div className="mt-8 flex flex-wrap gap-2">
        {QUESTIONS.slice(0, idx).map(prev => (
          <span key={prev.id} className="inline-flex items-center gap-1.5 rounded-full bg-white border border-line px-2.5 py-1 text-[11.5px] font-mono text-ink-3">
            <Icon name={prev.icon} className="w-3 h-3" /><span className="capitalize">{prev.id}</span>
            <span className={`tabular ${answers[prev.id] === 'yes' ? 'text-teal-brand' : 'text-ink-3'}`}>{answers[prev.id] === 'yes' ? '✓' : answers[prev.id] === 'no' ? '—' : '?'}</span>
          </span>
        ))}
      </div>
    </main>
  );
}

// ===== PageResults.jsx =====
function PageResults({ t, lang, calc, onNext }) {
  const savingsVal = useCountUp(calc.savings, 1200);
  const payableVal = useCountUp(calc.payable, 900);
  const refundVal  = useCountUp(calc.refund, 900);
  const steps = [
    { label: t('res_gross'),       value: calc.gross,        tone: 'start' },
    { label: t('res_ded_stat'),    value: -calc.statutory,   tone: 'minus' },
    { label: t('res_ded_reliefs'), value: -calc.reliefTotal, tone: 'minus' },
    { label: t('res_chargeable'),  value: calc.chargeable,   tone: 'sub' },
    { label: t('res_tax'),         value: calc.tax,          tone: 'tax' },
    { label: t('res_rebates'),     value: -calc.rebate,      tone: 'minus' },
    { label: t('res_final'),       value: calc.payable,      tone: 'final' },
  ];
  const maxAbs = Math.max(...steps.map(s => Math.abs(s.value)), 1);
  return (
    <main className="max-w-[1200px] mx-auto px-5 md:px-8 pt-10 pb-24 slide-in">
      <section className="rounded-3xl overflow-hidden border border-line relative bg-white card-soft">
        <div className="absolute inset-0 pointer-events-none" style={{ background: 'radial-gradient(1200px 400px at 10% 0%, oklch(0.88 0.07 195 / 0.55), transparent 60%)' }} />
        <div className="relative p-8 md:p-12 grid lg:grid-cols-[1.3fr_1fr] gap-10 items-end">
          <div>
            <div className="text-[11.5px] uppercase tracking-[0.15em] text-ink-3 font-mono">Step 05 / 07</div>
            <div className="text-[11.5px] uppercase tracking-[0.18em] text-ink-3 font-mono mt-3">{t('res_eyebrow')}</div>
            <div className="mt-3 text-[17px] text-ink-2">{t('res_you_save')}</div>
            <div className="mt-2 font-display text-[88px] md:text-[128px] leading-[0.95] tracking-[-0.04em] text-teal-brand tabular">{fmtRM(savingsVal)}</div>
            <div className="mt-3 text-[14px] text-ink-3 max-w-lg leading-snug">{t('res_vs_default')}</div>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div className="rounded-2xl bg-paper-2 border border-line p-5"><div className="text-[11.5px] uppercase tracking-[0.12em] text-ink-3 font-mono">{t('res_final')}</div><div className="mt-2 font-display text-3xl tabular tracking-tight">{fmtRM(payableVal)}</div></div>
            <div className="rounded-2xl bg-teal-50b border border-teal-200b p-5"><div className="text-[11.5px] uppercase tracking-[0.12em] text-teal-700b font-mono">{t('res_refund')}</div><div className="mt-2 font-display text-3xl tabular tracking-tight text-teal-700b">{fmtRM(refundVal)}</div></div>
            <div className="col-span-2 rounded-2xl bg-white border border-line p-5 flex items-center justify-between">
              <div><div className="text-[11.5px] uppercase tracking-[0.12em] text-ink-3 font-mono">PCB withheld</div><div className="mt-1 font-mono text-[15px] tabular">{fmtRM(calc.pcb)}</div></div>
              <div className="text-right"><div className="text-[11.5px] uppercase tracking-[0.12em] text-ink-3 font-mono">Effective rate</div><div className="mt-1 font-mono text-[15px] tabular">{calc.effectiveRate}%</div></div>
            </div>
          </div>
        </div>
      </section>
      <div className="mt-10 grid lg:grid-cols-[1.4fr_1fr] gap-6">
        <section className="rounded-3xl border border-line bg-white overflow-hidden">
          <div className="px-7 py-5 border-b border-line flex items-center justify-between">
            <div><div className="font-display text-2xl tracking-tight">{t('res_reliefs_found')}</div><div className="text-[13px] text-ink-3 mt-0.5">{calc.reliefs.length} items · {fmtRM(calc.reliefTotal)} total</div></div>
            <div className="flex items-center gap-2 text-[11.5px] font-mono"><span className="inline-flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-teal-brand" /> {t('res_newly')}</span><span className="inline-flex items-center gap-1.5 text-ink-3"><span className="w-2 h-2 rounded-full bg-ink-3/40" /> {t('res_already')}</span></div>
          </div>
          <div className="divide-y divide-[color:var(--line)]">
            {calc.reliefs.map((r) => {
              const label = r.name[lang] || r.name.en; const isNew = r.isNew;
              return (
                <div key={r.id} className="px-7 py-4 flex items-center gap-4 hover:bg-paper-2 transition-colors group">
                  <div className="w-1 self-stretch rounded-full" style={{ background: isNew ? 'var(--teal-600)' : 'var(--line)' }} />
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                      <span className="text-[14.5px] font-medium">{label}</span>
                      {isNew ? <Chip tone="teal"><Icon name="sparkle" className="w-3 h-3" /> {t('res_newly')}</Chip> : <Chip tone="neutral">{t('res_already')}</Chip>}
                      <Chip tone="neutral" className="font-mono">{r.cite}</Chip>
                    </div>
                    <div className="mt-1 text-[12px] text-ink-3 font-mono">cap {fmtRM(r.cap)}{r.claimed ? ` · prior claim ${fmtRM(r.claimed)}` : ''}</div>
                  </div>
                  <div className="text-right tabular">
                    <div className={`font-display text-xl tracking-tight ${isNew ? 'text-teal-brand' : ''}`}>{fmtRM(r.amount)}</div>
                    {isNew && r.amount > 0 && <div className="text-[11.5px] text-ink-3 font-mono">+{fmtRM(r.amount - (r.claimed || 0))} new</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </section>
        <section className="rounded-3xl border border-line bg-white p-7">
          <div className="font-display text-2xl tracking-tight">{t('res_waterfall')}</div>
          <div className="text-[13px] text-ink-3 mt-0.5">Derivation from gross to final payable</div>
          <div className="mt-6 space-y-2">
            {steps.map((s, i) => {
              const isNeg = s.value < 0; const pct = Math.min(100, (Math.abs(s.value) / maxAbs) * 100);
              const colors = { start: 'bg-ink', minus: 'bg-[color:oklch(0.78_0.05_30)]', sub: 'bg-ink-2', tax: 'bg-[color:oklch(0.66_0.13_25)]', final: 'bg-teal-brand' };
              const isFinal = s.tone === 'final' || s.tone === 'sub';
              return (
                <div key={i}>
                  <div className="flex items-baseline justify-between text-[12.5px] font-mono">
                    <span className={isFinal ? 'text-ink font-semibold' : 'text-ink-2'}>{s.label}</span>
                    <span className={`tabular ${isNeg ? 'text-ink-3' : isFinal ? 'text-ink' : 'text-ink-2'}`}>{isNeg ? '– ' : ''}{fmtRM(Math.abs(s.value))}</span>
                  </div>
                  <div className="h-2 mt-1 rounded-full bg-paper-2 overflow-hidden"><div className={`h-full rounded-full transition-all ${colors[s.tone]}`} style={{ width: pct + '%' }} /></div>
                </div>
              );
            })}
          </div>
          <div className="mt-6 rounded-2xl bg-teal-50b border border-teal-200b p-4">
            <div className="text-[11.5px] uppercase tracking-[0.12em] text-teal-700b font-mono">Bottom line</div>
            <div className="mt-1 flex items-baseline justify-between"><span className="text-[14px] text-ink-2">{t('res_refund')}</span><span className="font-display text-2xl tabular tracking-tight text-teal-700b">{fmtRM(calc.refund)}</span></div>
          </div>
        </section>
      </div>
      <div className="mt-10 flex items-center justify-end"><Button size="lg" onClick={onNext}>{t('res_next')}<Icon name="arrowRight" className="w-4 h-4" /></Button></div>
    </main>
  );
}

// ===== PageAction.jsx =====
function PageAction({ t, lang, actions, onNext }) {

  const label = (m) => m[lang] || m.en;
  const totalSave = actions.reduce((s, a) => s + a.save, 0);
  const totalSpend = actions.reduce((s, a) => s + a.spend, 0);
  return (
    <main className="max-w-[1200px] mx-auto px-5 md:px-8 pt-14 pb-24 slide-in">
      <div className="flex flex-col md:flex-row md:items-end md:justify-between gap-6">
        <div className="max-w-2xl">
          <div className="text-[11.5px] uppercase tracking-[0.15em] text-ink-3 font-mono">Step 06 / 07</div>
          <h1 className="mt-3 font-display text-5xl md:text-6xl tracking-tight leading-[1.05]">{t('act_title')}</h1>
          <p className="mt-4 text-[16.5px] text-ink-2 leading-relaxed">{t('act_sub')}</p>
        </div>
        <div className="rounded-2xl border border-line bg-white p-5 min-w-[260px]">
          <div className="text-[11.5px] uppercase tracking-[0.12em] text-ink-3 font-mono">If you do all three</div>
          <div className="mt-2 flex items-baseline gap-2"><span className="text-ink-3 text-[14px]">spend</span><span className="font-display text-xl tabular tracking-tight">{fmtRM(totalSpend)}</span></div>
          <div className="mt-1 flex items-baseline gap-2"><span className="text-teal-brand text-[14px]">save</span><span className="font-display text-2xl tabular tracking-tight text-teal-brand">{fmtRM(totalSave)}</span></div>
        </div>
      </div>
      <div className="mt-12 grid md:grid-cols-3 gap-5">
        {actions.map((a, i) => {
          const on = !!added[a.id];
          return (
            <div key={a.id} className="rounded-3xl border border-line bg-white overflow-hidden relative flex flex-col">
              <div className="px-7 pt-7 pb-4">
                <div className="flex items-start justify-between"><div className="w-10 h-10 rounded-xl bg-teal-50b text-teal-brand flex items-center justify-center"><span className="font-display text-lg tabular">{i + 1}</span></div><Chip tone="teal">{label(a.tag)}</Chip></div>
                <div className="mt-5 font-display text-[26px] leading-[1.15] tracking-tight" style={{ textWrap: 'balance' }}>{label(a.title)}</div>
              </div>
              <div className="px-7 py-4 border-y border-line bg-paper-2/50 grid grid-cols-3 gap-2">
                <div><div className="text-[10.5px] uppercase tracking-[0.12em] text-ink-3 font-mono">{t('act_spend')}</div><div className="mt-1 font-mono text-[14.5px] tabular">{fmtRM(a.spend)}</div></div>
                <div><div className="text-[10.5px] uppercase tracking-[0.12em] text-teal-700b font-mono">{t('act_save')}</div><div className="mt-1 font-display text-xl tabular tracking-tight text-teal-brand">{fmtRM(a.save)}</div></div>
                <div><div className="text-[10.5px] uppercase tracking-[0.12em] text-ink-3 font-mono">{t('act_deadline')}</div><div className="mt-1 font-mono text-[13px] text-ink-2">{label(a.deadline)}</div></div>
              </div>
              <div className="px-7 py-5 flex-1">
                <div className="text-[11.5px] uppercase tracking-[0.12em] text-ink-3 font-mono">{t('act_why')}</div>
                <p className="mt-2 text-[13.5px] text-ink-2 leading-relaxed">{label(a.why)}</p>
                <div className="mt-3"><Chip tone="teal" className="font-mono">{a.cite}</Chip></div>
              </div>
              <div className="px-7 pb-6">
                <button onClick={() => toggle(a.id)} className={`w-full rounded-full py-3 text-[14px] font-medium transition-all ${on ? 'bg-teal-900b text-white' : 'bg-white border border-line hover:bg-paper-2'}`}>
                  {on ? <span className="inline-flex items-center gap-2"><Icon name="check" className="w-4 h-4" /> {t('act_added')}</span> : <span className="inline-flex items-center gap-2"><Icon name="plus" className="w-4 h-4" /> {t('act_add')}</span>}

            </div>

      <div className="mt-12 flex items-center justify-end"><Button size="lg" onClick={onNext}>{t('act_next')}<Icon name="chat" className="w-4 h-4" /></Button></div>

// ===== PageChat.jsx — calls /api/chat =====
function PageChat({ t, lang }) {
  const [msgs, setMsgs] = React.useState([{ role: 'assistant', text: lang === 'bm' ? 'Hai! Saya Taxation. Tanya apa sahaja tentang pelepasan atau cukai anda — saya akan petik rujukan LHDN.' : 'Hi! I\u2019m Taxation. Ask me anything about your reliefs or tax bill — I\u2019ll cite LHDN sources.', cites: [] }]);
  const [input, setInput] = React.useState('');
  const [thinking, setThinking] = React.useState(false);
  const scrollRef = React.useRef(null);

  React.useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [msgs, thinking]);

  const send = (q) => {
    if (!q.trim()) return;
    setMsgs(m => [...m, { role: 'user', text: q }]); setInput(''); setThinking(true);
    API.post('/api/chat', { question: q, lang }).then((r) => {
      setMsgs(m => [...m, { role: 'assistant', text: r.text, cites: r.cites || [] }]); setThinking(false);
    }).catch(() => {
      setMsgs(m => [...m, { role: 'assistant', text: lang === 'bm' ? 'Maaf, sambungan ke pelayan gagal. Cuba lagi.' : 'Sorry, the connection to the server failed. Please try again.', cites: [] }]); setThinking(false);
    });
  };

  const renderText = (text) => (text || '').split(/(\*\*[^*]+\*\*)/g).map((p, i) => p.startsWith('**') && p.endsWith('**') ? <strong key={i} className="font-semibold">{p.slice(2, -2)}</strong> : <span key={i} style={{ whiteSpace: 'pre-wrap' }}>{p}</span>);

  return (
    <main className="max-w-[900px] mx-auto px-5 md:px-8 pt-14 pb-24 slide-in">
      <div className="flex items-end justify-between mb-6">
        <div><div className="text-[11.5px] uppercase tracking-[0.15em] text-ink-3 font-mono">Step 07 / 07</div><h1 className="mt-3 font-display text-5xl md:text-6xl tracking-tight leading-[1.05]">{t('chat_title')}</h1><p className="mt-3 text-[15.5px] text-ink-2">{t('chat_sub')}</p></div>
      </div>
      <div className="rounded-3xl border border-line bg-white overflow-hidden flex flex-col h-[640px]">
        <div ref={scrollRef} className="flex-1 overflow-y-auto scroll-area p-6 md:p-8 space-y-5">
          {msgs.map((m, i) => (
            <div key={i} className={`flex gap-3 ${m.role === 'user' ? 'flex-row-reverse' : ''}`}>
              <div className={`w-8 h-8 rounded-full shrink-0 flex items-center justify-center ${m.role === 'user' ? 'bg-ink text-white' : 'bg-teal-50b text-teal-brand border border-teal-200b'}`}>{m.role === 'user' ? <Icon name="user" className="w-4 h-4" /> : <Logo className="w-5 h-5" />}</div>
              <div className={`max-w-[78%] ${m.role === 'user' ? 'text-right' : ''}`}>
                <div className={`rounded-2xl px-4 py-3 text-[14.5px] leading-relaxed ${m.role === 'user' ? 'bg-ink text-white rounded-tr-sm inline-block text-left' : 'bg-paper-2 text-ink rounded-tl-sm'}`}>{renderText(m.text)}</div>
                {m.cites && m.cites.length > 0 && <div className="mt-2 flex flex-wrap gap-1.5">{m.cites.map((c, j) => <Chip key={j} className="font-mono">{c}</Chip>)}</div>}
              </div>
            </div>
          ))}
          {thinking && (
            <div className="flex gap-3">
              <div className="w-8 h-8 rounded-full shrink-0 bg-teal-50b text-teal-brand border border-teal-200b flex items-center justify-center"><Logo className="w-5 h-5" /></div>
              <div className="rounded-2xl rounded-tl-sm px-4 py-3 bg-paper-2 text-ink-3 text-[13.5px] inline-flex items-center gap-2">
                <span>{t('chat_thinking')}</span>
                <span className="inline-flex gap-1"><span className="w-1.5 h-1.5 rounded-full bg-teal-brand/70 animate-bounce" style={{ animationDelay: '0ms' }} /><span className="w-1.5 h-1.5 rounded-full bg-teal-brand/70 animate-bounce" style={{ animationDelay: '150ms' }} /><span className="w-1.5 h-1.5 rounded-full bg-teal-brand/70 animate-bounce" style={{ animationDelay: '300ms' }} /></span>
              </div>
            </div>
          )}
        </div>
        {msgs.length <= 1 && (
          <div className="px-6 md:px-8 pb-3 flex flex-wrap gap-2">
            {['chat_suggest_1', 'chat_suggest_2', 'chat_suggest_3'].map(k => <button key={k} onClick={() => send(t(k))} className="text-[12.5px] text-ink-2 bg-paper-2 border border-line rounded-full px-3 py-1.5 hover:bg-white hover:border-teal-brand hover:text-teal-brand transition-colors">{t(k)}</button>)}
          </div>
        )}
        <form onSubmit={(e) => { e.preventDefault(); send(input); }} className="border-t border-line p-3 flex items-center gap-2 bg-white">
          <input value={input} onChange={(e) => setInput(e.target.value)} placeholder={t('chat_placeholder')} className="flex-1 bg-paper-2 rounded-full px-5 py-3 text-[14px] focus:outline-none focus:ring-2 focus:ring-teal-200b" />
          <Button type="submit" disabled={!input.trim()}>{t('chat_send')} <Icon name="send" className="w-4 h-4" /></Button>
        </form>
      </div>
      <div className="mt-4 text-center text-[11.5px] text-ink-3 font-mono">{t('chat_disclaimer')}</div>
    </main>
  );
}

// ===== App.jsx — route switcher + shared state =====
function App() {
  const [lang, setLang] = React.useState(() => localStorage.getItem('tx_lang') || 'en');
  const [page, setPage] = React.useState('landing');
  const [mode, setMode] = React.useState(null);
  const [extracted, setExtracted] = React.useState(null);
  const [answers, setAnswers] = React.useState({});
  const [result, setResult] = React.useState(null); // { calc, actions }
  const t = useI18n(lang);

  React.useEffect(() => { localStorage.setItem('tx_lang', lang); }, [lang]);

  const order = ['landing', 'mode', 'upload', 'wizard', 'calculating', 'results', 'action', 'chat'];
  const visibleOrder = ['landing', 'mode', 'upload', 'wizard', 'results', 'action', 'chat'];
  const go = (p) => { setPage(p); window.scrollTo({ top: 0, behavior: 'instant' }); };
  const pageIndex = visibleOrder.indexOf(page === 'calculating' ? 'wizard' : page);

  const back = () => { const i = visibleOrder.indexOf(page); if (i > 0) go(visibleOrder[i - 1]); };
  const restart = () => { setPage('landing'); setMode(null); setExtracted(null); setAnswers({}); setResult(null); };

  const compute = (ans) => {
    setAnswers(ans); go('calculating');
    API.post('/api/calculate', { mode, extracted, answers: ans })
      .then((data) => { setResult(data); go('results'); })
      .catch(() => { go('results'); });
  };

  return (
    <div className="min-h-screen">
      <Navbar lang={lang} onLang={setLang} mode={mode} onMode={() => go('mode')} canBack={pageIndex > 0 && page !== 'calculating'} onBack={back} onRestart={restart} t={t} step={pageIndex} totalSteps={7} />

      {page === 'landing' && <PageLanding t={t} onStart={() => go('mode')} />}
      {page === 'mode' && <PageMode t={t} lang={lang} onPick={(m) => { setMode(m); go('upload'); }} />}
      {page === 'upload' && mode && <PageUpload t={t} lang={lang} mode={mode} onDone={(f) => { setExtracted(f); go('wizard'); }} />}
      {page === 'upload' && !mode && (() => { go('mode'); return null; })()}
      {page === 'wizard' && <PageWizard t={t} onDone={compute} />}
      {page === 'calculating' && <PageCalculating t={t} />}
      {page === 'results' && result && <PageResults t={t} lang={lang} calc={result.calc} onNext={() => go('action')} />}
      {page === 'results' && !result && (() => { go('mode'); return null; })()}
      {page === 'action' && result && <PageAction t={t} lang={lang} actions={result.actions} onNext={() => go('chat')} />}
      {page === 'chat' && <PageChat t={t} lang={lang} />}

      <footer className="border-t border-line bg-paper-2/50">
        <div className="max-w-[1200px] mx-auto px-5 md:px-8 py-10 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
          <div className="flex items-center gap-2.5"><Logo className="w-6 h-6 opacity-70" /><div className="text-[12.5px] text-ink-3 font-mono">Taxation · YA 2025 demo · not legal advice</div></div>
          <div className="flex items-center gap-3 text-[12px] text-ink-3 font-mono"><span>Bands: ITA 1967 Sch. 1</span><span>·</span><span>Reliefs: YA 2025</span><span>·</span><span>Flask backend</span></div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
